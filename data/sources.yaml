  region: National
  organization_type: aggregator
  source_type: aggregator
  base_url: https://www.biddingo.com
  listing_pattern: tenders
  parser_class: BiddingoCrawler
  crawl_frequency: daily
  active: true
  notes: >-
    Canada's largest e-procurement aggregator. 1.2M+ bids from hundreds of
    public sector organizations. REST API at api.biddingo.com/restapi provides
    JSON listing and detail data without authentication.
    Keyword search via POST /bidding/list/noauthorize/{offset} with
    searchString body parameter. Detail via GET /bidding/noauthorize/{s}/{o}/{t}.
  crawl_config:
    crawler_class: biddingo
    max_pages_per_search: 3
    page_size: 25
    fetch_detail: true
    rate_limit_seconds: 2
  industry_fit_score: 80
  source_priority: critical
  listing_path: /search
