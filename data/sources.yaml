- source_id: canadabuys_federal
  source_name: CanadaBuys (Federal)
  country: CA
  region: National
  organization_type: federal_government
  source_type: bid_portal
  base_url: https://canadabuys.canada.ca
  listing_pattern: tender-opportunities
  parser_class: CanadaBuysCrawler
  crawl_frequency: daily
  active: true
  notes: >-
    Canadian federal procurement via Open Data CSV. Covers all Schedule I, II, III
    departments, Crown corporations, and agencies. Open tender notices file refreshed
    daily 7-8:30am EST. Authoritative source for Government of Canada tenders.
  crawl_config:
    crawler_class: canadabuys
    csv_url: https://canadabuys.canada.ca/opendata/pub/openTenderNotice-ouvertAvisAppelOffres.csv
  industry_fit_score: 75
  source_priority: critical
  listing_path: /en/tender-opportunities
