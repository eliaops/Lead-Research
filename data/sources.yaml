- source_id: biddingo
  source_name: Biddingo
  country: CA
  region: National
  organization_type: aggregator
  source_type: aggregator
  base_url: https://www.biddingo.com
  listing_pattern: search
  parser_class: BiddingoCrawler
  crawl_frequency: daily
  active: true
  notes: >-
    Canadian procurement aggregator with 1.2M+ bid listings. REST API available
    at api.biddingo.com. Crawler searches by industry keywords (26 terms) to
    target window covering, textile, and furnishing opportunities. Best used as
    a keyword search engine rather than full listing scrape.
  crawl_config:
    crawler_class: biddingo
    max_pages_per_search: 3
    page_size: 25
    fetch_detail: true
    rate_limit_seconds: 2
  industry_fit_score: 80
  source_priority: critical
  listing_path: /search
